baseURL = "https://example.com/"
languageCode = "en"
title = "Your Community"
theme = "popular"

# Events use real future dates; without this Hugo treats a future date as the
# publish date and silently drops upcoming events from the build.
buildFuture = true

[taxonomies]
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 10
[[menu.main]]
  name = "About us"
  parent = "About"
  url = "/about/"
  weight = 10
[[menu.main]]
  name = "Organizers"
  parent = "About"
  url = "/organizers/"
  weight = 20
[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 20
[[menu.main]]
  name = "Events"
  url = "/events/"
  weight = 30
[[menu.main]]
  name = "Handbook"
  url = "/handbook/"
  weight = 50

[params]
  tagline = "A starter site for the Popular theme"
  description = "Describe your community here."
  brandName = "Your"
  brandSub = "Community"
  logo = "images/logo.png"
  ogImage = "images/hero.png"
  landAcknowledgement = "Add your community's land acknowledgement or welcome statement here, this demo keeps it as a placeholder."

  [params.brand]
    # Re-brand the whole site here, see /docs/theming/ on the theme site.
    # primary       = "#0f766e"
    # surfaceWash   = "#d7ece9"
    # fontDisplay   = "Quantico, Inter, sans-serif"

  [params.cta]
    label = "RSVP"
    url   = "https://example.com/rsvp"
    icon  = "fa-solid fa-calendar"


  [[params.social]]
    label = "Instagram"
    icon  = "fa-brands fa-instagram"
    url   = "https://example.com"
  [[params.social]]
    label = "Mastodon"
    icon  = "fa-brands fa-mastodon"
    url   = "https://example.com"
  [[params.social]]
    label = "RSS"
    icon  = "fa-solid fa-rss"
    url   = "/blog/index.xml"
  [[params.social]]
    label = "Email"
    icon  = "fa-solid fa-envelope"
    url   = "mailto:hello@example.com"

  [params.footer]
    tagline = "Your community's motto goes here"
    [params.footer.credit]
      label = "Popular. A Hugo theme by Mariatta."
      url   = "https://mariatta.ca"
    [[params.footer.columns]]
      title = "Community"
      [[params.footer.columns.links]]
        label = "About us"
        url = "/about/"
      [[params.footer.columns.links]]
        label = "Blog"
        url = "/blog/"
      [[params.footer.columns.links]]
        label = "Code of Conduct"
        url = "/code-of-conduct/"
    [[params.footer.columns]]
      title = "Get involved"
      [[params.footer.columns.links]]
        label = "Host a session"
        url = "/get-involved/"
      [[params.footer.columns.links]]
        label = "Offer a venue"
        url = "/get-involved/"
      [[params.footer.columns.links]]
        label = "Organizers"
        url = "/organizers/"
      [[params.footer.columns.links]]
        label = "Sponsors"
        url = "/sponsors/"
    [[params.footer.columns]]
      title = "Organizers"
      [[params.footer.columns.links]]
        label = "Organizer Handbook"
        url = "/handbook/"
      [[params.footer.columns.links]]
        label = "Meetup Runbooks"
        url = "/runbooks/"
