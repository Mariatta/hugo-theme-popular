baseURL = "https://example.com/"
languageCode = "en"
title = "Truly Madly Riley"
theme = "popular"

# Events use real future dates; without this Hugo treats a future date as the
# publish date and silently drops upcoming appearances from the build.
buildFuture = true

# Small page size so the demo shows the theme's list pagination.
[pagination]
  pagerSize = 3

[taxonomies]
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 10
[[menu.main]]
  name = "News"
  url = "/blog/"
  weight = 20
[[menu.main]]
  name = "Appearances"
  url = "/events/"
  weight = 30
[[menu.main]]
  name = "Listening guide"
  url = "/listening-guide/"
  weight = 40

[params]
  tagline = "A fictional superfan's personal site, demo content for the Popular theme"
  description = "Riley's corner of the internet: Darren Hayes fandom, vinyl news, and the occasional conference talk. (Riley is a made-up person, this is example content demonstrating the Popular theme as a personal site.)"
  brandName = "Truly Madly"
  brandSub = "Riley"
  logo = "images/logo.svg"
  ogImage = "images/hero.svg"
  customCSS = ["https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@700&display=swap"]
  landAcknowledgement = "Fan-made and gloriously unofficial: this site is a love letter, not affiliated with anyone it adores."

  # Celestial gold on midnight: burnished gold with dark button text,
  # silk-cream ink, deep cosmos surfaces. Uses the dark-palette brand keys.
  [params.brand]
    primary       = "#C3A364"   # burnished gold: buttons & main branding
    primaryHover  = "#D9BA7B"   # brighter champagne gold on hover
    primaryActive = "#A1834C"   # deeper metallic gold when active
    secondary     = "#E6C687"   # soft champagne shimmer
    accent        = "#F3E5AB"   # radiant stardust cream
    ink           = "#F4F1EA"   # silk-cream headings on the dark backgrounds
    link          = "#D9BA7B"   # prose links need light gold on midnight
    linkHover     = "#F3E5AB"
    surfaceWash   = "#121B2D"   # midnight-blue hero / section wash
    surfaceWashSoft = "#141F36"
    surfaceInk    = "#0A0E1A"   # deep cosmos footer bands
    surfacePage   = "#0A0E1A"   # the page itself goes dark
    surfaceCard   = "#121B2D"
    surfaceTertiary = "#0F1626"
    textBody      = "#D9D4C5"
    textMuted     = "#A39D8A"
    textOnBrand   = "#0A0E1A"   # dark text on gold buttons, not white
    borderSubtle  = "#26304A"
    fontDisplay   = '"Cinzel Decorative", Cinzel, Inter, sans-serif'

  [params.cta]
    label = "Say hi"
    url   = "mailto:hello@example.com"
    icon  = "fa-solid fa-envelope"

  # A personal site's tip jar: the support box at the end of each blog post.
  [params.support]
    badge = "Enjoying the blog?"
    text = "This site is a one-person labour of love (and of one particular discography). If a post made your day, you can toss a coin in the tip jar or just tell me your favourite b-side."
    [[params.support.ctas]]
      label = "Tip jar"
      url = "https://example.com/tips"
      variant = "primary"
    [[params.support.ctas]]
      label = "Say hi"
      url = "mailto:hello@example.com"
      variant = "outline"

  [params.demoBar]
    current = "superfan"
    repo = "https://github.com/Mariatta/hugo-theme-popular"
    [[params.demoBar.links]]
      slug = "aquarium"
      label = "Aquarium"
      icon = "fa-solid fa-fish"
    [[params.demoBar.links]]
      slug = "foodie"
      label = "Foodie"
      icon = "fa-solid fa-utensils"
    [[params.demoBar.links]]
      slug = "kdrama"
      label = "KDrama"
      icon = "fa-solid fa-tv"
    [[params.demoBar.links]]
      slug = "superfan"
      label = "Superfan"
      icon = "fa-solid fa-star"

  [[params.social]]
    label = "Mastodon"
    icon  = "fa-brands fa-mastodon"
    url   = "https://example.com"
  [[params.social]]
    label = "Instagram"
    icon  = "fa-brands fa-instagram"
    url   = "https://example.com"
  [[params.social]]
    label = "RSS"
    icon  = "fa-solid fa-rss"
    url   = "/blog/index.xml"
  [[params.social]]
    label = "Email"
    icon  = "fa-solid fa-envelope"
    url   = "mailto:hello@example.com"

  [params.footer]
    tagline = "Truly, madly, deeply a fan site, a Hugo demo site for the Popular theme"
    [params.footer.credit]
      label = "Popular. A Hugo theme by Mariatta."
      url   = "https://mariatta.ca"
    [[params.footer.columns]]
      title = "Site"
      [[params.footer.columns.links]]
        label = "About"
        url = "/about/"
      [[params.footer.columns.links]]
        label = "News"
        url = "/blog/"
      [[params.footer.columns.links]]
        label = "Appearances"
        url = "/events/"
    [[params.footer.columns]]
      title = "Fan stuff"
      [[params.footer.columns.links]]
        label = "Listening guide"
        url = "/listening-guide/"
      [[params.footer.columns.links]]
        label = "Concert prep"
        url = "/concert-prep/"
    [[params.footer.columns]]
      title = "Say hi"
      [[params.footer.columns.links]]
        label = "Email"
        url = "mailto:hello@example.com"
      [[params.footer.columns.links]]
        label = "Mastodon"
        url = "https://example.com"
