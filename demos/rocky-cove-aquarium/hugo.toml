baseURL = "https://example.com/"
languageCode = "en"
title = "Rocky Cove Aquarium Club"
theme = "popular"

# Events use real future dates; without this Hugo treats a future date as the
# publish date and silently drops upcoming events from the build.
buildFuture = true

# Small page size so the demo shows the theme's list pagination.
[pagination]
  pagerSize = 3

[taxonomies]
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 10
[[menu.main]]
  name = "About us"
  parent = "About"
  url = "/about/"
  weight = 10
[[menu.main]]
  name = "Organizers"
  parent = "About"
  url = "/organizers/"
  weight = 20
[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 20
[[menu.main]]
  name = "Events"
  url = "/events/"
  weight = 30
[[menu.main]]
  name = "Handbook"
  url = "/handbook/"
  weight = 50

[params]
  tagline = "A fictional aquarium club, demo content for the Popular theme"
  description = "A friendly club for freshwater and saltwater keepers in Rocky Cove. (Rocky Cove is a made-up place, this is example content demonstrating the Popular theme.)"
  brandName = "Rocky Cove"
  brandSub = "Aquarium Club"
  logo = "images/logo.png"
  ogImage = "images/hero.png"
  landAcknowledgement = "Add your community's land acknowledgement or welcome statement here, this demo keeps it as a placeholder."

  [params.brand]
    primary       = "#0f766e"
    primaryHover  = "#0d5f59"
    primaryActive = "#0b4f4a"
    secondary     = "#0b4f4a"
    accent        = "#b45309"
    surfaceWash   = "#d7ece9"
    surfaceWashSoft = "#ecf6f4"

  [params.cta]
    label = "RSVP"
    url   = "https://example.com/rsvp"
    icon  = "fa-solid fa-calendar"

  [params.demoBar]
    current = "aquarium"
    repo = "https://github.com/your-org/hugo-theme-popular"
    [[params.demoBar.links]]
      slug = "aquarium"
      label = "Aquarium"
      icon = "fa-solid fa-fish"
    [[params.demoBar.links]]
      slug = "foodie"
      label = "Foodie"
      icon = "fa-solid fa-utensils"
    [[params.demoBar.links]]
      slug = "kdrama"
      label = "KDrama"
      icon = "fa-solid fa-tv"
    [[params.demoBar.links]]
      slug = "superfan"
      label = "Superfan"
      icon = "fa-solid fa-star"

  [[params.social]]
    label = "Instagram"
    icon  = "fa-brands fa-instagram"
    url   = "https://example.com"
  [[params.social]]
    label = "Mastodon"
    icon  = "fa-brands fa-mastodon"
    url   = "https://example.com"
  [[params.social]]
    label = "RSS"
    icon  = "fa-solid fa-rss"
    url   = "/blog/index.xml"
  [[params.social]]
    label = "Email"
    icon  = "fa-solid fa-envelope"
    url   = "mailto:hello@example.com"

  [params.footer]
    tagline = "Fish · Plants · Community, a Hugo demo site for the Popular theme"
    [params.footer.credit]
      label = "Popular. A Hugo theme by Mariatta."
      url   = "https://mariatta.ca"
    [[params.footer.columns]]
      title = "Community"
      [[params.footer.columns.links]]
        label = "About us"
        url = "/about/"
      [[params.footer.columns.links]]
        label = "Blog"
        url = "/blog/"
      [[params.footer.columns.links]]
        label = "Code of Conduct"
        url = "/code-of-conduct/"
    [[params.footer.columns]]
      title = "Get involved"
      [[params.footer.columns.links]]
        label = "Host a session"
        url = "/get-involved/"
      [[params.footer.columns.links]]
        label = "Offer a venue"
        url = "/get-involved/"
      [[params.footer.columns.links]]
        label = "Organizers"
        url = "/organizers/"
    [[params.footer.columns]]
      title = "Organizers"
      [[params.footer.columns.links]]
        label = "Organizer Handbook"
        url = "/handbook/"
      [[params.footer.columns.links]]
        label = "Meetup Runbooks"
        url = "/runbooks/"
