name: Helper script tests

# Unit tests for the Python helper scripts (importers, sponsor updater).
# Standard library only: no dependencies to install.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s scripts/tests -v
      - name: Parity check against astro-theme-popular
        run: |
          # Lockstep changes (a Tier-1 file added in both repos) use the SAME
          # branch name in both repos; prefer that branch on the sibling so
          # paired PRs check against each other, not against stale main.
          BRANCH="${{ github.head_ref || github.ref_name }}"
          git clone --depth 1 -b "$BRANCH" https://github.com/Mariatta/astro-theme-popular ../astro-theme-popular 2>/dev/null \
            || git clone --depth 1 https://github.com/Mariatta/astro-theme-popular ../astro-theme-popular 2>/dev/null \
            || { echo "::notice::sibling repo not clonable; parity check skipped"; exit 0; }
          bash scripts/sync-shared.sh --check

