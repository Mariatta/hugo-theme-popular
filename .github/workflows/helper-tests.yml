name: Helper script tests

# Unit tests for the Python helper scripts (importers, sponsor updater).
# Standard library only: no dependencies to install.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 -m unittest discover -s scripts/tests -v
      - name: Parity check against astro-theme-popular
        run: |
          if git clone --depth 1 https://github.com/Mariatta/astro-theme-popular ../astro-theme-popular 2>/dev/null; then
            bash scripts/sync-shared.sh --check
          else
            echo "::notice::sibling repo not clonable (private?); parity check skipped"
          fi

