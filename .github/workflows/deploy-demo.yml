name: Deploy theme site + demos (GitHub Pages)

# Publishes the theme's project site at the Pages root, with the four demo
# sites at subpaths:
#
#   /            ← site/ (Popular project site, docs, blog, about)
#   /aquarium/   ← demos/rocky-cove-aquarium
#   /foodie/     ← demos/lucky-town-foodie
#   /kdrama/     ← demos/kdrama-fan-club
#   /superfan/   ← demos/truly-madly-riley
#
# Enable Pages first: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build project site + demos
        env:
          BASE: ${{ steps.pages.outputs.base_url }}
        run: |
          THEME="$(basename "$GITHUB_WORKSPACE")"
          build () {  # build <source-dir> <dest-subpath ("" for root)>
            hugo --source "$1" \
                 --themesDir "$(realpath --relative-to="$1" "$GITHUB_WORKSPACE/..")" \
                 --theme "$THEME" \
                 --baseURL "$BASE/$2" \
                 --destination "$GITHUB_WORKSPACE/public/$2" \
                 --minify
          }
          build site ""
          build demos/rocky-cove-aquarium aquarium/
          build demos/lucky-town-foodie foodie/
          build demos/kdrama-fan-club kdrama/
          build demos/truly-madly-riley superfan/


      - name: No internal link may escape the base path
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          # Root-relative href/src that skips the base path 404s on the
          # subpath deployment (the bug class fixed by rel-href). Quoted or
          # minified-unquoted attributes both match; // (protocol-relative)
          # is external and exempt.
          if [ -z "$BASE_PATH" ]; then echo "root deployment; nothing to scan"; exit 0; fi
          leaks=$(grep -rhoE '(href|src)="?/[^/][^" >]*' public --include='*.html' \
                  | grep -vE "^(href|src)=\"?$BASE_PATH(/|\"|$)" | sort -u | head -20 || true)
          if [ -n "$leaks" ]; then
            echo "::error::internal links escape $BASE_PATH:"; echo "$leaks"; exit 1
          fi
          echo "no escapes"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
